name: oss-ws
status: draft
version: 0.1.0-draft
domain: oss.ws
description: Standards assistant for OSS-WS project artifacts, including changelogs, commits, pull requests, issues, release notes, and documentation.
entrypoint: ../skill.md
license: MIT
maintainers:
  - Selcuk Cukur <hello@selcukcukur.me>
capabilities:
  - changelog.author
  - changelog.review
  - standards.draft
  - standards.review
  - phase.changelog_update
  - phase.commit_ready
sources:
  specs:
    - ../../../specs/oss-changelog.md
  docs:
    - ../../../docs/changelog-guide.md
  rules:
    - ../rules/changelog/file-format.md
    - ../rules/changelog/release-entry.md
    - ../rules/changelog/change-items.md
    - ../rules/changelog/references.md
    - ../rules/changelog/noise.md
    - ../rules/changelog/agent-workflow.md
  evals:
    - ../evals/changelog.yml
defaults:
  changelog_file: changelog.md
  status: draft
  date_format: YYYY-MM-DD
  release_order: newest-first
phase_policy:
  require_changelog_update: true
  require_commit_after_phase: true
  draft_until_stable_requested: true
failure_policy:
  on_conflicting_rules: flag_conflict
  on_missing_references: keep_human_readable_draft
  on_untraceable_change: ask_or_mark_for_review
